<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整合速查 · 题库信息站</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://unpkg.com/pinyin-pro"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sync-banner" id="syncBanner">
  <div class="sync-banner-spinner"></div>
  <span>正在同步数据…</span>
</div>

<button class="fab" id="fabAdd">＋</button>
<div class="mask" id="mask">
  <div class="sheet">
    <h3 id="sheetTitle">补充新词条</h3> <label>分类</label>
    <select id="inCat"></select>
    <label>问题</label>
    <input id="inQ" placeholder="例如：XX 的信息素是什么？">
    <label>答案</label>
    <input id="inA" placeholder="例如：黑檀木">
    <label>拓展说明（可留空）</label>
    <textarea id="inExtra" placeholder="补充说明…"></textarea>
    <div class="row">
      <button class="btn-cancel" id="btnCancel">取消</button>
      <button class="btn-save" id="btnSave">保存并同步</button>
    </div>
    <div class="sync-tip">三人打开同一链接即可实时看到彼此新增的内容</div>
  </div>
</div>

<div class="masthead">
  <div class="kicker">Field Notes · Reference</div>
  <h1>整合速查</h1>
  <div class="issue" id="issueLine">实时检索</div>
</div>
<hr class="rule">

<div class="topbar">
  <div class="searchbox">
    <span class="icon">⌕</span>
    <input type="text" id="searchInput" placeholder="输入人名 / 关键词 / 拼音首字母…" autocomplete="off">
    <button class="clear-btn" id="clearBtn">✕</button>
    <button class="graph-toggle-btn" id="docToggleBtn">📄 文档模式</button>
    <button class="graph-toggle-btn" id="graphToggleBtn">🕸️ 图表模式</button>
    <button class="graph-toggle-btn" id="quizToggleBtn">📝 答题模式</button>
  </div>
  <div class="tabs" id="storyBar"></div>
</div>

<div class="groupzone">
  <div class="groupbar" id="groupBar"></div>
  <div class="groupdrawer" id="groupDrawer"></div>
</div>

<div class="result-bar" id="resultBar"></div>
<div class="feed" id="feed"></div>
<div class="graph-mode-switch" id="graphModeSwitch" style="display:none;">
  <button class="graph-mode-btn active" data-mode="network">🕸️ 网络图</button>
  <button class="graph-mode-btn" data-mode="mindmap">🌳 思维导图</button>
</div>
<div id="graphContainer"></div>

<!-- 设置答题选项弹窗 -->
<div class="mask" id="quizSetMask">
  <div class="sheet">
    <h3>设置答题选项</h3>
    <label>题目</label>
    <input id="quizSetQ" disabled>
    <label>正确答案</label>
    <input id="quizSetCorrect" disabled>
    <label>错误选项 1</label>
    <input id="quizWrong1" placeholder="填写一个错误答案">
    <label>错误选项 2</label>
    <input id="quizWrong2" placeholder="填写另一个错误答案">
    <div class="row">
      <button class="btn-cancel" id="quizSetCancel">取消</button>
      <button class="btn-save" id="quizSetSave">保存</button>
    </div>
  </div>
</div>

<!-- 答题模式界面 -->
<div class="quiz-mask" id="quizMask">
  <div class="quiz-panel">
    <button class="quiz-close-btn" id="quizCloseBtn">✕</button>
    <div class="quiz-timer-ring">
      <svg class="quiz-timer-svg" viewBox="0 0 100 100">
        <circle class="quiz-timer-bg" cx="50" cy="50" r="45"></circle>
        <circle class="quiz-timer-fg" id="quizTimerFg" cx="50" cy="50" r="45"></circle>
      </svg>
      <div class="quiz-timer-text">
        <div class="quiz-timer-label">剩余时间</div>
        <div class="quiz-timer-value" id="quizTimerValue">01:00</div>
      </div>
    </div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-label">答题进度 <span id="quizProgressText">1 / 5</span></div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
    </div>
    <div class="quiz-question" id="quizQuestion"></div>
    <div class="quiz-options" id="quizOptions"></div>
  </div>
</div>

<!-- 卷轴结果弹窗 -->
<div class="scroll-mask" id="scrollMask">
  <div class="scroll-paper">
    <div class="scroll-title" id="scrollTitle"></div>
    <div class="scroll-content" id="scrollContent"></div>
    <div class="scroll-btn-row">
      <button class="scroll-review-btn" id="scrollReviewBtn" style="display:none;">回顾答题</button>
      <button class="scroll-close-btn" id="scrollCloseBtn">确定</button>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
