<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整合速查 · 题库信息站</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root{
    --ink:#151414;
    --paper:#FBFAF8;
    --rule:#1c1b1b;
    --accent:#A8321E;
    --sub:#8a8783;
    --hair:#e3e0da;
  }
  *{box-sizing:border-box;}
  ::selection{ background:var(--accent); color:#fff; }
  body{
    margin:0;
    background:var(--paper);
    font-family:"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);
    padding-bottom:80px;
  }

  /* ---------- 刊头 masthead ---------- */
  .masthead{
    max-width:640px;
    margin:0 auto;
    padding:34px 20px 0;
    text-align:center;
  }
  .kicker{
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin-bottom:10px;
  }
  .masthead h1{
    font-family:Georgia,"Times New Roman","Songti SC",serif;
    font-size:44px;
    font-weight:700;
    letter-spacing:-0.5px;
    margin:0 0 6px;
    line-height:1.05;
  }
  .masthead .issue{
    font-size:11.5px;
    color:var(--sub);
    letter-spacing:.05em;
    margin-bottom:22px;
  }
  .rule{
    border:none;
    border-top:1.5px solid var(--rule);
    max-width:640px;
    margin:0 auto;
  }
  .rule.thin{ border-top:1px solid var(--hair); }

  /* ---------- 顶部栏（吸顶） ---------- */
  .topbar{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(251,250,248,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--hair);
    padding:12px 20px;
  }
  .searchbox{
    max-width:600px;
    margin:0 auto;
    position:relative;
    display:flex;
    align-items:center;
    border-bottom:1.5px solid var(--rule);
    padding-bottom:6px;
  }
  .searchbox .icon{
    font-size:13px;
    margin-right:10px;
    opacity:.55;
  }
  .searchbox input{
    flex:1;
    border:none;
    background:none;
    outline:none;
    font-size:15px;
    color:var(--ink);
    font-family:inherit;
    letter-spacing:.02em;
  }
  .searchbox input::placeholder{ color:#b8b4ad; font-style:italic; }
  .clear-btn{
    background:none;border:none;
    color:var(--sub);
    font-size:14px;
    cursor:pointer;
    padding:2px 4px;
    display:none;
  }

  /* ================= 新增：图表模式切换按钮样式 ================= */
  .graph-toggle-btn {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    margin-left: 8px;
    transition: all 0.2s;
  }
  .graph-toggle-btn:hover { background: var(--accent); }
  .graph-toggle-btn.active { background: var(--accent); }

  /* ---------- 分类目录 tabs ---------- */
  .tabs{
    max-width:600px;
    margin:12px auto 0;
    display:flex;
    gap:2px;
    overflow-x:auto;
    scrollbar-width:none;
    padding:0 0 12px;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    padding:6px 13px;
    font-size:12px;
    letter-spacing:.03em;
    color:var(--sub);
    border:1px solid var(--hair);
    border-radius:2px;
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s ease;
    background:transparent;
  }
  .tab:hover{ border-color:var(--ink); color:var(--ink); }
  .tab.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }
  .tab.tab-add{
    color:var(--accent);
    border-color:var(--accent);
    border-style:dashed;
    font-weight:600;
  }
  .tab.tab-add:hover{ background:var(--accent); color:#fff; }

  /* ---------- 大类导航（大框 → 抽屉展开小框）---------- */
  .groupzone{
    max-width:600px;
    margin:0 auto;
    padding:0 20px;
  }
  .groupbar{
    display:flex;
    gap:10px;
    overflow-x:auto;
    scrollbar-width:none;
    padding:14px 0 0;
  }
  .groupbar::-webkit-scrollbar{ display:none; }
  .bigtab{
    flex:0 0 auto;
    padding:12px 18px;
    font-size:13.5px;
    font-weight:600;
    letter-spacing:.03em;
    color:var(--ink);
    background:#fff;
    border:1.5px solid var(--ink);
    border-radius:12px;
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s ease;
  }
  .bigtab:hover{ background:#f2f0ec; }
  .bigtab.active{
    background:var(--ink);
    color:#fff;
  }
  .bigtab.bigtab-add{
    border-style:dashed;
    border-color:var(--accent);
    color:var(--accent);
  }
  .bigtab.bigtab-add:hover{ background:var(--accent); color:#fff; }

  .groupdrawer{
    display:none;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
    padding:14px;
    background:#f2f0ec;
    border-radius:12px;
    border:1px dashed var(--hair);
    animation:drawerOpen .22s ease;
  }
  @keyframes drawerOpen{
    from{ opacity:0; transform:translateY(-6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .drawer-tab{
    background:#fff;
  }

  /* ---------- 结果统计 ---------- */
  .result-bar{
    max-width:640px;
    margin:16px auto 0;
    padding:0 20px;
    font-size:11px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--sub);
  }

  /* ---------- feed / 版面 ---------- */
  .feed{
    max-width:640px;
    margin:0 auto;
    padding:6px 20px 0;
    display:flex;
    flex-direction:column;
    transition:opacity .28s ease, filter .28s ease;
  }
  .feed.melting{
    opacity:0;
    filter:blur(6px);
  }

  /* ================= 新增：图表容器样式 ================= */
  #graphContainer {
    max-width: 800px;
    height: 600px;
    margin: 20px auto;
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--hair);
    display: none; /* 默认隐藏 */
  }
  .graph-mode-switch{
    max-width:800px;
    margin:14px auto 0;
    display:none;
    justify-content:center;
    gap:10px;
  }
  .graph-mode-btn{
    padding:7px 16px;
    font-size:13px;
    border-radius:20px;
    border:1.5px solid var(--ink);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
  }
  .graph-mode-btn.active{
    background:var(--ink);
    color:#fff;
  }

  .post{
    padding:22px 0;
    border-bottom:1px solid var(--hair);
    animation:rise .38s ease both;
    position: relative; /* 新增：为操作按钮定位 */
    transition: background-color 0.2s ease; /* 新增：拖拽视觉反馈 */
  }
  .post:last-child{ border-bottom:none; }
  
  /* ================= 新增：编辑与删除按钮样式 ================= */
  .post-actions {
    position: absolute;
    right: 0;
    top: 22px;
    display: flex;
    gap: 10px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .post:hover .post-actions {
    opacity: 1; /* 鼠标悬浮显示 */
  }
  .action-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.5;
    padding: 0;
  }
  .action-btn:hover { opacity: 1; transform: scale(1.1); }
  
  /* ================= 新增：拖拽状态样式 ================= */
  .post.dragging {
    opacity: 0.5;
    background-color: var(--hair);
    border-radius: 8px;
    padding-left: 10px;
    padding-right: 10px;
  }
  .post.drag-over {
    border-top: 2px solid var(--ink);
  }

  @keyframes rise{
    from{ opacity:0; filter:blur(5px); transform:translateY(6px); }
    to{ opacity:1; filter:blur(0); transform:translateY(0); }
  }

  .post-kicker{
    font-size:10.5px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin-bottom:8px;
  }
  .post-q{
    font-family:Georgia,"Times New Roman","Songti SC",serif;
    font-size:19px;
    font-weight:700;
    line-height:1.4;
    margin-bottom:8px;
    letter-spacing:-0.2px;
  }
  .post-a{
    font-size:14px;
    color:var(--ink);
    line-height:1.6;
  }
  .post-a b{
    font-weight:700;
    border-bottom:2px solid var(--accent);
  }
  .post-extra{
    margin-top:10px;
    font-size:12.5px;
    color:var(--sub);
    line-height:1.6;
    padding-left:12px;
    border-left:2px solid var(--hair);
  }
  mark{
    background:none;
    color:var(--accent);
    font-weight:700;
  }

  .empty{
    text-align:center;
    color:var(--sub);
    padding:80px 20px;
    font-size:13px;
    letter-spacing:.03em;
    font-style:italic;
  }

  /* ---------- 新增词条：悬浮按钮 + 弹窗 ---------- */
  .fab{
    position:fixed;
    right:20px;
    bottom:22px;
    width:50px;height:50px;
    border-radius:50%;
    background:var(--ink);
    color:#fff;
    border:none;
    font-size:24px;
    line-height:1;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    z-index:60;
  }
  .mask{
    position:fixed;
    inset:0;
    background:rgba(20,18,17,.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:70;
  }
  .mask.show{ display:flex; }
  .sheet{
    background:var(--paper);
    width:100%;
    max-width:640px;
    border-radius:18px 18px 0 0;
    padding:20px 20px 26px;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{
    from{ transform:translateY(16px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .sheet h3{
    font-family:Georgia,"Songti SC",serif;
    font-size:18px;
    margin:0 0 14px;
  }
  .sheet label{
    display:block;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--sub);
    margin:12px 0 4px;
  }
  .sheet select, .sheet input, .sheet textarea{
    width:100%;
    border:1px solid var(--hair);
    border-radius:8px;
    padding:9px 10px;
    font-size:14px;
    font-family:inherit;
    background:#fff;
    outline:none;
  }
  .sheet textarea{ resize:vertical; min-height:50px; }
  .sheet .row{ display:flex; gap:14px; margin-top:18px; }
  .sheet button{
    flex:1;
    padding:11px;
    border-radius:8px;
    border:1px solid var(--ink);
    font-size:14px;
    cursor:pointer;
  }
  .btn-cancel{ background:#fff; color:var(--ink); }
  .btn-save{ background:var(--ink); color:#fff; }
  .sync-tip{
    font-size:11.5px;
    color:var(--sub);
    margin-top:10px;
    text-align:center;
  }
</style>
</head>
<body>

<button class="fab" id="fabAdd">＋</button>
<div class="mask" id="mask">
  <div class="sheet">
    <h3 id="sheetTitle">补充新词条</h3> <label>分类</label>
    <select id="inCat"></select>
    <label>问题</label>
    <input id="inQ" placeholder="例如：XX 的信息素是什么？">
    <label>答案</label>
    <input id="inA" placeholder="例如：黑檀木">
    <label>拓展说明（可留空）</label>
    <textarea id="inExtra" placeholder="补充说明…"></textarea>
    <div class="row">
      <button class="btn-cancel" id="btnCancel">取消</button>
      <button class="btn-save" id="btnSave">保存并同步</button>
    </div>
    <div class="sync-tip">三人打开同一链接即可实时看到彼此新增的内容</div>
  </div>
</div>

<div class="masthead">
  <div class="kicker">Field Notes · Reference</div>
  <h1>整合速查</h1>
  <div class="issue" id="issueLine">实时检索</div>
</div>
<hr class="rule">

<div class="topbar">
  <div class="searchbox">
    <span class="icon">⌕</span>
    <input type="text" id="searchInput" placeholder="输入人名 / 关键词 / 作品…" autocomplete="off">
    <button class="clear-btn" id="clearBtn">✕</button>
    <button class="graph-toggle-btn" id="graphToggleBtn">🕸️ 图表模式</button>
  </div>
  <div class="tabs" id="storyBar"></div>
</div>

<div class="groupzone">
  <div class="groupbar" id="groupBar"></div>
  <div class="groupdrawer" id="groupDrawer"></div>
</div>

<div class="result-bar" id="resultBar"></div>
<div class="feed" id="feed"></div>
<div class="graph-mode-switch" id="graphModeSwitch" style="display:none;">
  <button class="graph-mode-btn active" data-mode="network">🕸️ 网络图</button>
  <button class="graph-mode-btn" data-mode="mindmap">🌳 思维导图</button>
</div>
<div id="graphContainer"></div>

// ------------------ 数据 ------------------
const builtinCategories = [
  {key:"all", label:"全部", icon:"✨"},

let categoryOverrides = {};   // 内置分类的修改/删除记录，key为内置分类key
let customCategories = [];    // 用户新建的分类
let categories = [...builtinCategories];

// 大框类（分组）：每个分组下面挂着若干个小框类（categories 的 key）
let groups = [];        // {key, label, icon, catKeys:[...], _cloudKey}
let openGroupKey = null; // 当前展开抽屉的大类

// 根据内置分类 + 覆盖记录 + 自定义分类，重新计算最终显示的分类列表
function computeCategories(){
  const overridden = builtinCategories
    .map(c=>{
      const ov = categoryOverrides[c.key];
      if(!ov) return c;
      if(ov.deleted) return null;
      return { ...c, label: ov.label || c.label, icon: ov.icon || c.icon };
    })
    .filter(Boolean);
  categories = [...overridden, ...customCategories];
}

// ================ 长按分类标签：弹出 编辑/删除 菜单（内置分类也可以）================
async function handleLongPressCategory(catKey){
  if(catKey === "all"){
    alert("「全部」是固定标签，不能修改");
    return;
  }
  const cat = categories.find(c=>c.key===catKey);
  if(!cat) return;
  const isBuiltin = builtinCategories.some(c=>c.key===catKey);

  const action = prompt(
    `分类「${cat.icon} ${cat.label}」\n输入 1 = 编辑\n输入 2 = 删除\n其他 = 取消`,
    "1"
  );
  if(action === "1"){
    const icon = prompt("新的图标：", cat.icon);
    if(icon===null) return;
    const label = prompt("新的名称：", cat.label);
    if(!label) return;
    await saveCategoryEdit(catKey, isBuiltin, { label: label.trim(), icon: icon.trim() || cat.icon });
  }else if(action === "2"){
    const ok = confirm(`确定要删除分类「${cat.icon} ${cat.label}」吗？\n（该分类下已有的词条不会被删除，只是分类标签会消失）`);
    if(!ok) return;
    await saveCategoryDelete(catKey, isBuiltin);
  }
}

// 保存分类的修改（内置分类写覆盖记录，自定义分类直接改自身记录）
async function saveCategoryEdit(catKey, isBuiltin, newVal){
  try{
    if(isBuiltin){
      if(cloudMode==="firebase"){
        await dbSet(dbRef(db, "categoryOverrides/" + catKey), newVal);
      }else if(cloudMode==="claude"){
        await window.storage.set("categoryOverride:" + catKey, JSON.stringify(newVal), true);
        categoryOverrides[catKey] = newVal;
        computeCategories(); refreshCategoryUI();
      }else{
        categoryOverrides[catKey] = newVal;
        computeCategories(); refreshCategoryUI();
      }
    }else{
      const cat = categories.find(c=>c.key===catKey);
      if(cloudMode==="firebase" && cat._cloudKey){
        await dbUpdate(dbRef(db, "categories/" + cat._cloudKey), newVal);
      }else if(cloudMode==="claude" && cat._cloudKey){
        await window.storage.set(cat._cloudKey, JSON.stringify(newVal), true);
        Object.assign(cat, newVal);
        computeCategories(); refreshCategoryUI();
      }else{
        Object.assign(cat, newVal);
        computeCategories(); refreshCategoryUI();
      }
    }
    renderStories(); render(true);
  }catch(e){
    alert("修改分类失败：" + e.message);
  }
}

// 保存分类的删除（内置分类写“已删除”覆盖记录，自定义分类直接从云端移除）
async function saveCategoryDelete(catKey, isBuiltin){
  try{
    if(isBuiltin){
      const delVal = { deleted:true };
      if(cloudMode==="firebase"){
        await dbSet(dbRef(db, "categoryOverrides/" + catKey), delVal);
      }else if(cloudMode==="claude"){
        await window.storage.set("categoryOverride:" + catKey, JSON.stringify(delVal), true);
        categoryOverrides[catKey] = delVal;
        computeCategories(); refreshCategoryUI();
      }else{
        categoryOverrides[catKey] = delVal;
        computeCategories(); refreshCategoryUI();
      }
    }else{
      const cat = categories.find(c=>c.key===catKey);
      if(cloudMode==="firebase" && cat._cloudKey){
        await dbRemove(dbRef(db, "categories/" + cat._cloudKey));
      }else if(cloudMode==="claude" && cat._cloudKey){
        await window.storage.delete(cat._cloudKey, true);
        customCategories = customCategories.filter(c=>c.key!==catKey);
        computeCategories(); refreshCategoryUI();
      }else{
        customCategories = customCategories.filter(c=>c.key!==catKey);
        computeCategories(); refreshCategoryUI();
      }
    }
    if(activeCat===catKey){ activeCat = "all"; }
    renderStories(); render(true);
  }catch(e){
    alert("删除分类失败：" + e.message);
  }
}

// ================ 新建分类（标签栏"＋"按钮 / 下拉框 / 大类抽屉都会调用）================
async function createNewCategory(fromSelect, assignGroupKey){
  const icon = prompt("新分类图标（输入一个emoji，例如📌）：", "📌");
  if(icon===null){ if(fromSelect) inCat.value = categories[1].key; return; }
  const label = prompt("新分类名称：", "");
  if(!label){ if(fromSelect) inCat.value = categories[1].key; return; }
  const newCat = { label: label.trim(), icon: icon.trim() || "📌" };
  try{
    let newKey = null;
    if(cloudMode==="firebase"){
      const newRef = dbPush(dbRef(db, "categories"), newCat);
      newKey = "c_" + newRef.key;
      if(fromSelect) setTimeout(()=>{ inCat.value = newKey; }, 300);
    }else if(cloudMode==="claude"){
      const key = "category:" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
      await window.storage.set(key, JSON.stringify(newCat), true);
      newKey = "c_"+key;
      customCategories.push({ key:newKey, label:newCat.label, icon:newCat.icon, _cloudKey:key });
      computeCategories(); refreshCategoryUI();
      if(fromSelect) inCat.value = newKey;
    }else{
      newKey = "c_local_" + Date.now();
      customCategories.push({ key:newKey, label:newCat.label, icon:newCat.icon });
      computeCategories(); refreshCategoryUI();
      if(fromSelect) inCat.value = newKey;
    }
    if(assignGroupKey && newKey){
      setTimeout(()=> addCatKeyToGroup(assignGroupKey, newKey), cloudMode==="firebase" ? 350 : 0);
    }
  }catch(e){
    alert("新增分类失败：" + e.message);
    if(fromSelect) inCat.value = categories[1].key;
  }
}

// 往大类里添加小类：选已有的，或新建一个
function addCategoryToGroup(groupKey){
  const g = groups.find(x=>x.key===groupKey);
  if(!g) return;
  const available = categories.filter(c=>c.key!=="all" && !(g.catKeys||[]).includes(c.key));
  const listStr = available.map((c,i)=>`${i+1}. ${c.icon} ${c.label}`).join("\n");
  const input = prompt(
    `把哪个小类加入「${g.label}」？\n输入编号选择已有的：\n${listStr}\n\n或输入 new 新建一个小类`,
    "new"
  );
  if(input===null) return;
  if(input.trim()==="new"){
    createNewCategory(false, groupKey);
    return;
  }
  const idx = parseInt(input.trim()) - 1;
  const picked = available[idx];
  if(!picked){ alert("没找到这个编号"); return; }
  addCatKeyToGroup(groupKey, picked.key);
}

// 把某个小类key实际写入分组，并持久化
function addCatKeyToGroup(groupKey, catKey){
  const g = groups.find(x=>x.key===groupKey);
  if(!g) return;
  if(!g.catKeys) g.catKeys = [];
  if(!g.catKeys.includes(catKey)) g.catKeys.push(catKey);
  saveGroupCatKeys(g);
}

async function saveGroupCatKeys(g){

      await dbUpdate(dbRef(db, "groups/" + g._cloudKey), { catKeys: g.catKeys });
    }else if(cloudMode==="claude" && g._cloudKey){
      await window.storage.set(g._cloudKey, JSON.stringify({ label:g.label, icon:g.icon, catKeys:g.catKeys }), true);
    }
  }catch(e){ console.error("保存大类失败", e); }
  renderDrawer();
}

function watchGroups(){
  dbOnValue(dbRef(db, "groups"), (snapshot)=>{
    const val = snapshot.val() || {};
    groups = Object.entries(val).map(([k,v])=>({ key:"g_"+k, label:v.label, icon:v.icon, catKeys:v.catKeys||[], _cloudKey:k }));
    renderGroups(); renderDrawer();
  });
}
async function loadClaudeGroups(){
  try{
    const list = await window.storage.list("group:", true);
    if(!list || !list.keys) return;
    const loaded = [];
    for(const key of list.keys){
      try{
        const res = await window.storage.get(key, true);
        if(res && res.value){
          const v = JSON.parse(res.value);
          loaded.push({ key:"g_"+key, label:v.label, icon:v.icon, catKeys:v.catKeys||[], _cloudKey:key });
        }
      }catch(e){ /* 单条读取失败忽略 */ }
    }
    groups = loaded;
    renderGroups(); renderDrawer();
  }catch(e){ console.error("大类加载失败", e); }
}

function highlight(text, kw){
  if(!kw) return text;
  try{
    const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), "gi");
    return text.replace(re, m => `<mark>${m}</mark>`);
  }catch(e){ return text; }
}

function paint(){
  const kw = keyword.trim();
  const allData = getAllData();
  let list = allData.filter(item=>{
    const matchCat = activeCat==="all" || item.cat===activeCat;
    if(!matchCat) return false;
    if(!kw) return true;
    const hay = (item.q + item.a + (item.extra||"")).toLowerCase();
    return hay.includes(kw.toLowerCase());
  });

  resultBar.textContent = kw || activeCat!=="all"
    ? `${list.length} RESULTS`
    : `${allData.length} ENTRIES · REAL-TIME SEARCH`;

  if(list.length===0){
    feed.innerHTML = `<div class="empty">— 没有找到相关内容，换个关键词试试 —</div>`;
    // 若开启了图表模式，清空图表
    if (isGraphMode) renderGraph(list);
    return;
  }

  // ================= 修改：在原版模板中插入了动作按钮和拖拽属性 =================
  feed.innerHTML = list.map((item,i)=>{
    const c = catInfo(item.cat);
    return `<div class="post" draggable="true" data-global-idx="${item._globalIndex}" style="animation-delay:${Math.min(i*22,260)}ms">
      <div class="post-actions">
        <button class="action-btn edit-btn" data-idx="${item._globalIndex}" title="编辑">✏️</button>
        <button class="action-btn del-btn" data-idx="${item._globalIndex}" title="删除">🗑️</button>
      </div>
      <div class="post-kicker">${c.icon} ${c.label}</div>
      <div class="post-q">${highlight(item.q, kw)}</div>
      <div class="post-a"><b>${highlight(item.a, kw)}</b></div>
      ${item.extra ? `<div class="post-extra">${highlight(item.extra, kw)}</div>` : ""}
    </div>`;
  }).join("");

  // 新增：每次重绘时，如果在图表模式下，更新图表
  if (isGraphMode) {
    renderGraph(list);
  }
  
  // 新增：重新绑定拖拽事件
  bindDragEvents();
}

function watchCategories(){

    customCategories = Object.entries(val).map(([k,v])=>({ key:"c_"+k, label:v.label, icon:v.icon, _cloudKey:k }));
    computeCategories();
    refreshCategoryUI();
  });
  dbOnValue(dbRef(db, "categoryOverrides"), (snapshot)=>{

    computeCategories();

}
async function loadClaudeCategories(){
  try{
    const list = await window.storage.list("category:", true);
    if(list && list.keys){
      const custom = [];
      for(const key of list.keys){
        try{
          const res = await window.storage.get(key, true);
          if(res && res.value){
            const v = JSON.parse(res.value);
            custom.push({ key:"c_"+key, label:v.label, icon:v.icon, _cloudKey:key });
          }
        }catch(e){ /* 单条读取失败忽略 */ }
      }
      customCategories = custom;
    }
  }catch(e){ console.error("自定义分类加载失败", e); }

  try{
    const list2 = await window.storage.list("categoryOverride:", true);
    if(list2 && list2.keys){
      for(const key of list2.keys){
        try{
          const res = await window.storage.get(key, true);
          if(res && res.value){
            const builtinKey = key.replace("categoryOverride:", "");
            categoryOverrides[builtinKey] = JSON.parse(res.value);
          }
        }catch(e){ /* 单条读取失败忽略 */ }
      }
    }
  }catch(e){ console.error("内置分类覆盖记录加载失败", e); }

  computeCategories();
  refreshCategoryUI();
}

// ---- Claude 云存储：一次性加载 ----
async function loadClaudeEntries(){
  try{
    const list = await window.storage.list("entry:", true);
    if(!list || !list.keys) return;
    for(const key of list.keys){
      try{
        const res = await window.storage.get(key, true);
        if(res && res.value) {
          const parsed = JSON.parse(res.value);
          parsed._cloudKey = key; // 新增：保存Claude的key用于删除/修改
          cloudEntries.push(parsed);
        }
      }catch(e){ /* 单条读取失败忽略 */ }
    }
  }catch(e){ console.error("Claude 云存储加载失败", e); }
}

// ---- Firebase：实时监听，任何人新增都会自动推送给所有人 ----
function watchFirebase(){
  const entriesRef = dbRef(db, "entries");
  dbOnValue(entriesRef, (snapshot)=>{
    const val = snapshot.val() || {};
    // 新增：保留 Firebase 的 key 以便后续修改/删除
    cloudEntries = Object.keys(val).map(k => ({ ...val[k], _cloudKey: k }));
    updateIssueLine();
    render(true);
  });
}

// ================= 修改：btnSave 改为处理 新增 和 编辑 两种情况 =================
btnSave.addEventListener("click", async ()=>{
  const q = inQ.value.trim();
  const a = inA.value.trim();
  if(!q || !a){
    alert("问题和答案不能为空");
    return;
  }
  const itemData = { cat: inCat.value, q, a, extra: inExtra.value.trim() || null };

  btnSave.textContent = "同步中…";
  btnSave.disabled = true;
  try{
    if(currentEditIndex === -1) {
      // ==== 新增逻辑 ====
      if(cloudMode==="firebase"){
        await dbPush(dbRef(db, "entries"), itemData);
      }else if(cloudMode==="claude"){
        const key = "entry:" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
        itemData._cloudKey = key;
        const result = await window.storage.set(key, JSON.stringify(itemData), true);
        if(!result) throw new Error("写入失败");
        cloudEntries.push(itemData);
        updateIssueLine();
        render(true);
      }else{
        data.push(itemData); // 本地模式存入 data 数组
        updateIssueLine();
        render(true);
      }
    } else {
      // ==== 编辑逻辑 ====
      const allData = getAllData();
      const targetItem = allData[currentEditIndex];
      const isCloud = currentEditIndex >= data.length; // 判断是否是云端数据

      if(isCloud) {
        if(cloudMode==="firebase"){
          await dbUpdate(dbRef(db, "entries/" + targetItem._cloudKey), itemData);
        } else if(cloudMode==="claude") {
          itemData._cloudKey = targetItem._cloudKey;
          await window.storage.set(targetItem._cloudKey, JSON.stringify(itemData), true);
          cloudEntries[currentEditIndex - data.length] = itemData;
          render(true);
        }
      } else {
        // 本地预设数据修改（刷新后重置）
        data[currentEditIndex] = itemData;
        render(true);
      }
    }
    inQ.value = ""; inA.value = ""; inExtra.value = "";
    mask.classList.remove("show");
  }catch(e){
    alert("同步失败：" + e.message);
  }finally{
    btnSave.textContent = "保存并同步";
    btnSave.disabled = false;
  }
});

// ================= 新增功能核心 1：编辑与删除事件代理 =================
feed.addEventListener("click", async (e) => {
  const btn = e.target.closest('.action-btn');
  if(!btn) return;
  
  const idx = parseInt(btn.dataset.idx);
  const allData = getAllData();
  const targetItem = allData[idx];
  const isCloud = idx >= data.length;

  if(btn.classList.contains('edit-btn')) {
    // 触发编辑
    currentEditIndex = idx;
    sheetTitle.textContent = "修改词条";
    inCat.value = targetItem.cat;
    inQ.value = targetItem.q;
    inA.value = targetItem.a;
    inExtra.value = targetItem.extra || "";
    mask.classList.add("show");
  } 
  else if(btn.classList.contains('del-btn')) {
    // 触发删除
    if(!confirm("确定要删除这条记录吗？")) return;
    try {
      if(isCloud) {
        if(cloudMode === "firebase") {
          await dbRemove(dbRef(db, "entries/" + targetItem._cloudKey));
        } else if(cloudMode === "claude") {
          await window.storage.delete(targetItem._cloudKey);
          cloudEntries.splice(idx - data.length, 1);
        }
      } else {
        // 删除本地数据
        data.splice(idx, 1);
      }
      updateIssueLine();
      render(true);
    } catch(err) {
      alert("删除失败：" + err.message);
    }
  }
});

// ================= 新增功能核心 2：拖拽排序 =================
let dragStartIndex = -1;

function bindDragEvents() {
  const posts = document.querySelectorAll('.post');
  posts.forEach(post => {
    post.addEventListener('dragstart', function(e) {
      dragStartIndex = parseInt(this.dataset.globalIdx);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    
    post.addEventListener('dragover', function(e) {
      e.preventDefault(); // 必须阻止默认行为才能触发 drop
      this.classList.add('drag-over');
      e.dataTransfer.dropEffect = 'move';
    });
    
    post.addEventListener('dragleave', function() {
      this.classList.remove('drag-over');
    });
    
    post.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      posts.forEach(p => p.classList.remove('drag-over'));
    });
    
    post.addEventListener('drop', function(e) {
      e.stopPropagation();
      this.classList.remove('drag-over');
      const dragEndIndex = parseInt(this.dataset.globalIdx);
      if(dragStartIndex === dragEndIndex) return;

      // 在内存中交换位置 (注意：若是云端环境，纯前端的本地顺序互换在刷新后会恢复)
      // 如果要将顺序彻底保存到数据库结构会发生巨大变更，因此这里采用前端交互层面的互换
      const allData = getAllData();
      const isStartCloud = dragStartIndex >= data.length;
      const isEndCloud = dragEndIndex >= data.length;
      
      let startArr = isStartCloud ? cloudEntries : data;
      let startArrIdx = isStartCloud ? (dragStartIndex - data.length) : dragStartIndex;
      let endArr = isEndCloud ? cloudEntries : data;
      let endArrIdx = isEndCloud ? (dragEndIndex - data.length) : dragEndIndex;

      // 互换元素
      let temp = startArr[startArrIdx];
      startArr[startArrIdx] = endArr[endArrIdx];
      endArr[endArrIdx] = temp;

      render(true);
    });
  });
}

function renderGraph(currentList) {

  if(graphViewMode === "mindmap"){
    renderMindmap(currentList);
  }else{
    renderNetworkGraph(currentList);
  }
}

// ---- 模式一：星系连线图（原有）----
function renderNetworkGraph(currentList) {
  const nodes = [];
  const links = [];
  const rootName = "188 速查网络";

  // 中心节点
  nodes.push({ name: rootName, symbolSize: 50, itemStyle: { color: '#151414' }, label: { show: true, fontSize: 16 } });

  // 分类节点，去重并添加
  const usedCats = new Set();
  currentList.forEach(item => {
    const catObj = catInfo(item.cat);
    if(!usedCats.has(item.cat)) {
      usedCats.add(item.cat);
      nodes.push({ name: catObj.label, symbolSize: 35, itemStyle: { color: '#A8321E' }, label: { show: true } });
      links.push({ source: rootName, target: catObj.label });
    }
    
    // 问题节点 (叶子节点)
    const nodeName = item.q; 
    nodes.push({ 
      name: nodeName, 
      value: item.a, // hover 时展示答案
      symbolSize: 15, 
      itemStyle: { color: '#8a8783' }, 
      label: { show: false } 
    });
    links.push({ source: catObj.label, target: nodeName });
  });

  const option = {
    tooltip: {
      formatter: function(params) {
        if(params.data.value) return `<b>Q:</b> ${params.data.name}<br><b>A:</b> <span style="color:#A8321E">${params.data.value}</span>`;
        return params.name;
      }
    },
    series: [
      {
        type: 'graph',
        layout: 'force',
        data: nodes,
        links: links,
        roam: true, // 允许缩放和拖拽画布
        label: { position: 'right' },
        force: {
          repulsion: 200,    // 节点排斥力
          edgeLength: [50, 150] // 连线长度范围
        },
        lineStyle: { color: 'source', curveness: 0.2 }
      }
    ]
  };

  myChart.setOption(option, true);
}

// ---- 模式二：思维导图（树状，从中心向右展开）----
function renderMindmap(currentList) {
  // 按分类分组
  const catMap = new Map(); // catKey -> {name, children:[]}
  currentList.forEach(item=>{
    const catObj = catInfo(item.cat);
    if(!catMap.has(item.cat)){
      catMap.set(item.cat, { name: `${catObj.icon} ${catObj.label}`, children: [] });
    }
    catMap.get(item.cat).children.push({
      name: item.q,
      value: item.a,
      children: item.extra ? [{ name: "💡 " + item.extra }] : []
    });
  });

  const treeData = [{
    name: "188 速查",
    children: Array.from(catMap.values())
  }];

  const option = {
    tooltip: {
      formatter: function(params){
        if(params.data.value) return `<b>Q:</b> ${params.data.name}<br><b>A:</b> <span style="color:#A8321E">${params.data.value}</span>`;
        return params.name;
      }
    },
    series: [
      {
        type: 'tree',
        data: treeData,
        top: '2%',
        left: '10%',
        bottom: '2%',
        right: '18%',
        symbolSize: 9,
        orient: 'LR', // 从左到右展开，就是常见的思维导图样式
        label: {
          position: 'left',
          verticalAlign: 'middle',
          align: 'right',
          fontSize: 12
        },
        leaves: {
          label: { position: 'right', verticalAlign: 'middle', align: 'left' }
        },
        itemStyle: { color: '#A8321E', borderColor: '#A8321E' },
        lineStyle: { color: '#c9c4bc', curveness: 0.5 },
        emphasis: { focus: 'descendant' },
        expandAndCollapse: true, // 点击节点可以收起/展开
        initialTreeDepth: 2,     // 默认展开到分类这一层
        animationDuration: 400,
        animationDurationUpdate: 400,
        roam: true
      }
    ]
  };

  myChart.setOption(option, true);
}

window.addEventListener('resize', () => {
